spring:
  application:
    name: stock-pilot

  datasource:
    url: jdbc:postgresql://localhost:5432/stock_pilot_db
    username: postgres
    password: King@2025

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  data:
    redis:
      host: localhost
      port: 6379

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GMAIL_ID}
    password: ${GMAIL_APP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    clean-disabled: true

jwt:
  secret:
    access: ${ACCESS_SECRET}
    refresh: ${REFRESH_SECRET}

  expiration:
    access: ${ACCESS_EXPIRATION}
    refresh: ${REFRESH_EXPIRATION}