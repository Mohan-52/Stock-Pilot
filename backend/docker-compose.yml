version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: stockpilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: stock_pilot
      POSTGRES_USER: stock_user
      POSTGRES_PASSWORD: stock_pass

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data


  redis:
    image: redis:7
    container_name: stockpilot-redis
    restart: unless-stopped
    ports:
      - "6379:6379"


    volumes:
      - redis_data:/data



volumes:
  postgres_data:
  redis_data: